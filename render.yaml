# Free-tier Render Blueprint for both Prism solutions.
# Dashboard: New → Blueprint → connect EranTenenboim/deploy
#
# Optional later: set PARQUET_URL on oracle services in the Dashboard, then redeploy.
#
# Limits: services sleep after ~15m idle; no persistent disks; 512MB RAM each.

services:
  - type: web
    name: prism-indeedee
    runtime: docker
    plan: free
    dockerfilePath: ./chief-of-staff-communication-agent/Dockerfile
    dockerContext: ./chief-of-staff-communication-agent
    healthCheckPath: /
    dockerCommand: bash -c 'export API_BASE_URL="${API_BASE_URL:-$RENDER_EXTERNAL_URL}"; exec node apps/api/dist/local-server.js'
    envVars:
      - key: INDEEDEE_SSO_ENABLED
        value: "false"
      - key: INDEEDEE_BRAIN_MODE
        value: rules
      - key: INDEEDEE_DB_URL
        value: file:/app/data/indeedee.db
      - key: SYNC_INTERVAL_MS
        value: "0"

  - type: web
    name: prism-oracle-mcp
    runtime: docker
    plan: free
    dockerfilePath: ./docker/oracle-mcp.Dockerfile
    dockerContext: ./oracle-property-intelligence-platform-pipeline-completion
    dockerCommand: bash -c 'mkdir -p /app/data; if [ -n "${PARQUET_URL:-}" ]; then curl -fsSL "$PARQUET_URL" -o /app/data/properties.parquet || true; fi; exec node start.mjs'
    envVars:
      - key: COUNTY
        value: santa-clara
      - key: PARQUET_PATH
        value: /app/data/properties.parquet

  - type: web
    name: prism-oracle-ui
    runtime: docker
    plan: free
    dockerfilePath: ./docker/oracle-ui.Dockerfile
    dockerContext: ./oracle-property-intelligence-platform-pipeline-completion
    healthCheckPath: /
    dockerCommand: bash -c 'mkdir -p /app/data; if [ -n "${PARQUET_URL:-}" ]; then curl -fsSL "$PARQUET_URL" -o /app/data/properties.parquet || true; fi; export UI_BASE_URL="${UI_BASE_URL:-$RENDER_EXTERNAL_URL}"; if [ -n "${MCP_ORIGIN:-}" ]; then export MCP_BASE_URL="${MCP_ORIGIN%/}/mcp"; fi; exec gunicorn --bind 0.0.0.0:${PORT:-10000} --workers 1 --threads 2 ui.app:app'
    envVars:
      - key: MCP_ORIGIN
        fromService:
          name: prism-oracle-mcp
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: PARQUET_PATH
        value: /app/data/properties.parquet
      - key: RUN_SUMMARY_PATH
        value: /app/data/run_summary.json
      - key: MANIFEST_PATH
        value: /app/manifest.json
      - key: COUNTY
        value: santa-clara
